name: Relay PR to IBM GHE

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master

jobs:
  relay-to-ibm-ghe:
    runs-on: ubuntu-latest
    steps:
      - name: Send Repository Dispatch to IBM GHE
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.IBM_GHE_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://github.ibm.com/api/v3/repos/MAHESH-BODAPATI/pytorch-power-backend/dispatches \
            -d '{
              "event_type": "pytorch_pr_trigger",
              "client_payload": {
                "pr_number": "${{ github.event.pull_request.number }}",
                "pr_title": "${{ github.event.pull_request.title }}",
                "pr_url": "${{ github.event.pull_request.html_url }}",
                "pr_head_sha": "${{ github.event.pull_request.head.sha }}",
                "pr_head_ref": "${{ github.event.pull_request.head.ref }}",
                "pr_base_ref": "${{ github.event.pull_request.base.ref }}",
                "pr_author": "${{ github.event.pull_request.user.login }}",
                "pr_repo": "${{ github.repository }}",
                "pr_clone_url": "${{ github.event.pull_request.head.repo.clone_url }}"
              }
            }'
      
      - name: Report Status
        run: |
          echo "✓ Dispatched PR #${{ github.event.pull_request.number }} to IBM GHE"
          echo "PR: ${{ github.event.pull_request.html_url }}"
          echo "IBM GHE will trigger buildbot build"
